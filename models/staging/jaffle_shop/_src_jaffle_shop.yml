sources:
  - name: jaffle_shop
    description: A clone of a Postgres database
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        description: Raw customers date
        columns:
          - name: id
            description: the primary key
            data_tests:
              - unique
              - not_null
      - name: orders
        config:
          freshness:
            warn_after: 
              count: 24 
              period: hour
            error_after:
              count: 48 
              period: hour
          loaded_at_field: _etl_loaded_at
          